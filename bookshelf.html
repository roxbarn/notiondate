<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Editable List</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    html {
      background-color: #333;
      background-image: linear-gradient(to top, #111, #333);
      background-repeat: no-repeat;
      background-size: 100% 200%;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      max-width: 800px;
      margin: 3rem auto;
      padding: 1rem;
      text-align: center;
    }

    form {
      margin-bottom: 1rem;
    }

    input[type="text"] {
      padding: .5rem;
      width: 60%;
      max-width: 400px;
      border-radius: 4px;
      border: 1px solid #ccc;
      margin-right: .5rem;
    }

    button {
      padding: .55rem .8rem;
      border-radius: 4px;
      border: none;
      background: brown;
      color: #fff;
      cursor: pointer;
    }

    ul.book-list {
      margin: 0 auto;
      padding: 0;
      list-style: none;
      border-bottom: 10px solid brown;
      display: inline-block;
    }

    ul.book-list li {
      font-family: Georgia, serif;
      padding: 1em .6em;
      background: #f1f1f1;
      display: inline-block;
      white-space: nowrap;
      border-radius: 2px 2px 0 0;
      margin-right: .3rem;
      background-image:
        linear-gradient(
          to right,
          rgba(0, 0, 0, .25),
          transparent 10%,
          rgba(0, 0, 0, .25) 90%
        );
      transition: transform .5s;
      color: #111;
    }

    ul.book-list li:last-child {
      transform: rotate(-5deg);
    }

    /* vertical writing mode for each li (kept from original) */
    ul.book-list li {
      writing-mode: vertical-rl;
    }

    /* small responsive tweak to wrap vertically written items on narrow screens */
    @media (max-width: 440px) {
      ul.book-list { transform: scale(.9); }
      input[type="text"] { width: 100%; margin-bottom: .5rem; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <form id="addForm">
      <input id="itemInput" type="text" placeholder="Add a book title" required />
      <button type="submit">Add</button>
    </form>

    <ul id="bookList" class="book-list" aria-live="polite">
      <li>Intermediate CSS</li>
      <li>PHP For Pros</li>
      <li>JavaScript Made Easy</li>
      <li>jQuery 2.0</li>
    </ul>
  </div>

  <script>
    const form = document.getElementById('addForm');
    const input = document.getElementById('itemInput');
    const list = document.getElementById('bookList');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      const li = document.createElement('li');
      li.textContent = text;
      // keep the same vertical writing mode
      li.style.writingMode = 'vertical-rl';
      list.appendChild(li);
      input.value = '';
      input.focus();
      // optional: scroll the new item into view
      li.scrollIntoView({ behavior: 'smooth', inline: 'center' });
    });
  </script>
</body>
</html>
